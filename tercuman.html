<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simultane Tercüman</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 700px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 600; margin-bottom: 1.5rem; }
.card { background: #fff; border: 1px solid #e0e0da; border-radius: 12px; padding: 1.25rem; margin-bottom: .75rem; }
.lbl { font-size: 11px; letter-spacing: .06em; color: #888; margin-bottom: 8px; font-weight: 500; }
select { flex: 1; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; color: #222; }
.lang-row { display: flex; align-items: center; gap: 8px; }
.swap-btn { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 6px 12px; font-size: 15px; cursor: pointer; color: #666; }
textarea { width: 100%; min-height: 100px; resize: vertical; padding: 10px 12px; border: 1px solid #e0e0da; border-radius: 8px; font-size: 15px; font-family: inherit; background: #fafaf8; color: #1a1a1a; line-height: 1.6; }
.btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
.btn-green { display: flex; align-items: center; gap: 6px; padding: 8px 18px; background: #1D9E75; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-green:hover { background: #0F6E56; }
.btn-green:disabled { background: #ccc; cursor: default; }
.btn-outline { display: flex; align-items: center; gap: 6px; padding: 8px 14px; background: #fff; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #555; cursor: pointer; }
.btn-mic.on { background: #E24B4A; border-color: #E24B4A; color: #fff; animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,.35)} 50%{box-shadow:0 0 0 7px rgba(226,75,74,0)} }
.mic-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
.toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.tog { position: relative; width: 36px; height: 20px; }
.tog input { opacity:0; width:0; height:0; }
.tog-sl { position:absolute; inset:0; background:#ccc; border-radius:20px; cursor:pointer; transition:background .2s; }
.tog-sl::before { content:''; position:absolute; width:14px; height:14px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:transform .2s; }
input:checked+.tog-sl { background:#1D9E75; }
input:checked+.tog-sl::before { transform:translateX(16px); }
.notice { font-size: 12px; padding: 8px 12px; border-radius: 8px; margin-top: 8px; display:none; line-height:1.5; }
.notice.err { background:#fdecea; color:#b71c1c; border:1px solid #ffcdd2; }
.notice.ok  { background:#e8f5e9; color:#1b5e20; border:1px solid #a5d6a7; }
.divrow { display:flex; align-items:center; gap:8px; margin:.5rem 0; }
.divline { flex:1; height:1px; background:#e8e8e4; }
.divtag { font-size:11px; color:#aaa; letter-spacing:.05em; }
.out-box { min-height: 100px; background: #fafaf8; border: 1px solid #e0e0da; border-radius: 8px; padding: 10px 12px; font-size: 15px; line-height: 1.6; color: #1a1a1a; }
.out-box.ph { color: #bbb; }
.spin { display:inline-block; width:14px; height:14px; border:2px solid #ddd; border-top-color:#555; border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.voice-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
.voice-card { border: 1px solid #e0e0da; border-radius: 8px; padding: 8px 10px; cursor: pointer; text-align: center; transition: all .15s; background: #fff; }
.voice-card:hover { border-color: #1D9E75; background: #f0f9f5; }
.voice-card.active { border-color: #1D9E75; background: #e8f5e9; }
.voice-card .vname { font-size: 13px; font-weight: 500; color: #222; }
.voice-card .vdesc { font-size: 10px; color: #999; margin-top: 2px; }
.speed-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.speed-row label { font-size: 12px; color: #888; white-space: nowrap; }
.speed-row input[type=range] { flex: 1; }
.hist { margin-top:.5rem; }
.hi { padding:8px 12px; border-left:2px solid #e0e0da; margin-bottom:6px; background:#fff; border-radius:0 8px 8px 0; }
.hi-s { font-size:11px; color:#999; margin-bottom:2px; }
.hi-t { font-size:14px; color:#222; }
</style>
</head>
<body>
<div class="container">
  <h1>🌐 Simultane Tercüman</h1>

  <!-- Ses Seçimi -->
  <div class="card">
    <div class="lbl">SES KARAKTERİ</div>
    <div class="voice-grid" id="voiceGrid"></div>
    <div class="speed-row">
      <label>Konuşma hızı</label>
      <input type="range" id="speedSlider" min="70" max="130" step="5" value="95">
      <span id="speedVal" style="font-size:12px;font-weight:500;min-width:32px">0.95×</span>
    </div>
  </div>

  <!-- Dil -->
  <div class="card">
    <div class="lbl">DİL ÇİFTİ</div>
    <div class="lang-row">
      <select id="src">
        <option value="tr">🇹🇷 Türkçe</option>
        <option value="en">🇬🇧 English</option>
        <option value="bg">🇧🇬 Български</option>
      </select>
      <button class="swap-btn" id="swapBtn">⇄</button>
      <select id="tgt">
        <option value="en">🇬🇧 English</option>
        <option value="tr">🇹🇷 Türkçe</option>
        <option value="bg">🇧🇬 Български</option>
      </select>
    </div>
  </div>

  <!-- Giriş -->
  <div class="card">
    <div class="lbl">METİN GİRİŞİ</div>
    <textarea id="srcText" placeholder="Çevirmek istediğiniz metni buraya yazın..."></textarea>
    <div class="btn-row">
      <button class="btn-green" id="translateBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Çevir
      </button>
      <button class="btn-outline btn-mic" id="micBtn">
        <div class="mic-dot"></div>
        <span id="micLabel">Mikrofon</span>
      </button>
    </div>
    <div id="notice" class="notice"></div>
    <div class="toggle-row">
      <label class="tog"><input type="checkbox" id="autoSpeak" checked><span class="tog-sl"></span></label>
      <span style="font-size:13px;color:#666">Otomatik seslendir</span>
    </div>
  </div>

  <div class="divrow">
    <div class="divline"></div>
    <span class="divtag" id="divTag">ÇEVİRİ</span>
    <div class="divline"></div>
  </div>

  <div class="card">
    <div class="lbl">ÇEVİRİ</div>
    <div class="out-box ph" id="outBox">Çeviri burada görünecek...</div>
    <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
      <button class="btn-outline" id="speakBtn" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>
        Seslendir
      </button>
      <span id="ttsMode" style="font-size:11px;color:#aaa"></span>
    </div>
  </div>

  <div class="hist" id="hist"></div>
</div>

<script>
const NAMES   = { tr:'Türkçe', en:'İngilizce', bg:'Bulgarca' };
const TTS_LNG = { tr:'tr-TR',  en:'en-US',     bg:'bg-BG' };
const STT_LNG = { tr:'tr-TR',  en:'en-US',     bg:'bg-BG' };
const VOICES  = [
  { id:'nova',    name:'Nova',    desc:'Genç, sıcak kadın',      e:'👩' },
  { id:'shimmer', name:'Shimmer', desc:'Yumuşak, sakin kadın',   e:'🌸' },
  { id:'alloy',   name:'Alloy',   desc:'Nötr, profesyonel',      e:'🎙️' },
  { id:'echo',    name:'Echo',    desc:'Olgun erkek',             e:'👨' },
  { id:'fable',   name:'Fable',   desc:'Sıcak anlatıcı',         e:'📖' },
  { id:'onyx',    name:'Onyx',    desc:'Derin, güçlü erkek',     e:'🎤' },
];

let selVoice = localStorage.getItem('voice') || 'nova';
let curText  = '';
let recog    = null;
let listening= false;
let timer    = null;
let finalTx  = '';

const $  = id => document.getElementById(id);
const srcSel = $('src'), tgtSel = $('tgt');
const srcText= $('srcText'), outBox= $('outBox');
const tBtn   = $('translateBtn'), micBtn= $('micBtn');
const micLbl = $('micLabel'), notice= $('notice');
const spkBtn = $('speakBtn'), autoSpk= $('autoSpeak');
const divTag = $('divTag'), histEl= $('hist');
const ttsMode= $('ttsMode'), speed = $('speedSlider');
const speedV = $('speedVal');

// Ses kartları
const grid = $('voiceGrid');
VOICES.forEach(v => {
  const c = document.createElement('div');
  c.className = 'voice-card' + (v.id === selVoice ? ' active' : '');
  c.innerHTML = `<div class="vname">${v.e} ${v.name}</div><div class="vdesc">${v.desc}</div>`;
  c.onclick = () => {
    selVoice = v.id;
    localStorage.setItem('voice', v.id);
    document.querySelectorAll('.voice-card').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    preview(v.id);
  };
  grid.appendChild(c);
});

speed.addEventListener('input', () => {
  speedV.textContent = (speed.value / 100).toFixed(2) + '×';
  localStorage.setItem('speed', speed.value);
});
const sv = localStorage.getItem('speed') || '95';
speed.value = sv;
speedV.textContent = (sv / 100).toFixed(2) + '×';

function updateTag() {
  divTag.textContent = NAMES[srcSel.value].toUpperCase() + ' → ' + NAMES[tgtSel.value].toUpperCase();
}
updateTag();
srcSel.onchange = updateTag;
tgtSel.onchange = updateTag;
$('swapBtn').onclick = () => {
  const t = srcSel.value; srcSel.value = tgtSel.value; tgtSel.value = t;
  updateTag(); if (listening) stopMic();
};

function showErr(msg) {
  notice.textContent = msg; notice.className = 'notice err'; notice.style.display = 'block';
}
function showOk(msg) {
  notice.textContent = msg; notice.className = 'notice ok'; notice.style.display = 'block';
  setTimeout(() => notice.style.display = 'none', 2500);
}

async function doTranslate(text) {
  if (!text.trim()) return;
  outBox.innerHTML = '<span class="spin"></span>';
  outBox.className = 'out-box';
  spkBtn.disabled  = true;
  tBtn.disabled    = true;
  notice.style.display = 'none';

  try {
    const res = await fetch('/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'Sen profesyonel bir çevirmensın. Verilen metni belirtilen dile çevir. Sadece çeviriyi yaz, açıklama ekleme.',
        messages: [{ role: 'user', content: `${NAMES[srcSel.value]} dilinden ${NAMES[tgtSel.value]} diline çevir:\n\n${text}` }]
      })
    });
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error?.message || 'HTTP ' + res.status);
    }
    const data = await res.json();
    const tr = data.content?.[0]?.text?.trim() || '';
    if (!tr) throw new Error('Boş yanıt');
    curText = tr;
    outBox.textContent = tr;
    outBox.className = 'out-box';
    spkBtn.disabled = false;
    addHist(text, tr);
    if (autoSpk.checked) speakText(tr);
  } catch(e) {
    outBox.className = 'out-box ph';
    outBox.textContent = 'Çeviri burada görünecek...';
    showErr('Hata: ' + (e.message || 'Bağlantı sorunu'));
  } finally {
    tBtn.disabled = false;
  }
}

tBtn.onclick = () => doTranslate(srcText.value.trim());
srcText.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); doTranslate(srcText.value.trim()); }
});

async function speakText(text, voiceOverride) {
  if (!text) return;
  const v = voiceOverride || selVoice;
  const s = speed.value / 100;
  ttsMode.textContent = '⏳ Ses üretiliyor...';
  try {
    const res = await fetch('/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voice: v, speed: s })
    });
    if (!res.ok) {
      const errJson = await res.json().catch(() => ({}));
      throw new Error(errJson.error || 'HTTP ' + res.status);
    }
    const arrayBuf = await res.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const decoded  = await audioCtx.decodeAudioData(arrayBuf);
    const source   = audioCtx.createBufferSource();
    source.buffer  = decoded;
    source.connect(audioCtx.destination);
    source.start(0);
    ttsMode.textContent = '🎙️ OpenAI · ' + (VOICES.find(x => x.id === v)?.name || v);
  } catch(e) {
    ttsMode.textContent = '⚠️ OpenAI hatası: ' + e.message;
    showErr('Ses hatası: ' + e.message);
  }
}

function preview(vid) {
  const p = { tr:'Merhaba, ben tercümanınızım.', en:'Hello, I am your translator.', bg:'Здравейте, аз съм вашият преводач.' };
  speakText(p[tgtSel.value] || p.en, vid);
}

spkBtn.onclick = () => speakText(curText);

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showErr('Ses tanıma desteklenmiyor. Chrome kullanın.'); return; }
  notice.style.display = 'none';
  recog = new SR();
  recog.lang = STT_LNG[srcSel.value] || 'tr-TR';
  recog.continuous = true;
  recog.interimResults = true;
  recog.onstart = () => {
    listening = true;
    micBtn.className = 'btn-outline btn-mic on';
    micLbl.textContent = 'Durdurun';
    showOk('Dinliyorum…');
    finalTx = '';
  };
  recog.onresult = e => {
    let interim = ''; finalTx = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTx += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    srcText.value = (finalTx + interim).trim();
    clearTimeout(timer);
    if (finalTx.trim()) timer = setTimeout(() => doTranslate(finalTx.trim()), 1500);
  };
  recog.onerror = e => {
    const m = { 'not-allowed':'Mikrofon izni gerekli.', 'no-speech':'Ses algılanamadı.', 'network':'Ağ hatası.' };
    showErr(m[e.error] || 'Hata: ' + e.error);
    stopMic();
  };
  recog.onend = () => { if (listening) try { recog.start(); } catch(_) {} };
  try { recog.start(); } catch(ex) { showErr('Mikrofon başlatılamadı.'); }
}

function stopMic() {
  listening = false;
  micBtn.className = 'btn-outline btn-mic';
  micLbl.textContent = 'Mikrofon';
  if (recog) { recog.onend = null; try { recog.stop(); } catch(_) {} recog = null; }
  if (finalTx.trim()) doTranslate(finalTx.trim());
  notice.style.display = 'none';
}

micBtn.onclick = () => { if (listening) stopMic(); else startMic(); };

function addHist(s, t) {
  const d = document.createElement('div');
  d.className = 'hi';
  d.innerHTML = `<div class="hi-s">${NAMES[srcSel.value]}: ${s.length>80?s.slice(0,80)+'…':s}</div><div class="hi-t">${t.length>100?t.slice(0,100)+'…':t}</div>`;
  histEl.insertBefore(d, histEl.firstChild);
  if (histEl.children.length > 5) histEl.removeChild(histEl.lastChild);
}

window.speechSynthesis.getVoices();
setTimeout(() => window.speechSynthesis.getVoices(), 500);
</script>
</body>
</html>
