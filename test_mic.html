<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mikrofon Test</title>
<style>
body { font-family: -apple-system, sans-serif; padding: 2rem; background: #f0f0ec; }
#btn {
  width: 100px; height: 100px; border-radius: 50%; border: none;
  background: #1D9E75; color: white; font-size: 16px; cursor: pointer;
  display: block; margin: 2rem auto; touch-action: none;
  -webkit-tap-highlight-color: transparent;
}
#btn.on { background: #E24B4A; }
#log { background: white; padding: 1rem; border-radius: 8px; min-height: 200px; font-size: 14px; white-space: pre-wrap; }
</style>
</head>
<body>
<div id="log">Butona bas, konuş, bırak...</div>
<button id="btn">🎙️ BAS</button>

<script>
const btn = document.getElementById('btn');
const log = document.getElementById('log');

let recog = null;
let micDown = false;
let accumulated = ''; // toplam metin - hiç sıfırlanmaz
let sessionText = ''; // bu basışın metni

function addLog(msg) {
  log.textContent += '\n' + new Date().toLocaleTimeString() + ': ' + msg;
  log.scrollTop = log.scrollHeight;
}

function startRecog() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { addLog('HATA: SpeechRecognition yok!'); return; }

  if (recog) {
    recog.onend = null; recog.onresult = null; recog.onerror = null;
    try { recog.stop(); } catch(e) {}
    recog = null;
  }

  recog = new SR();
  recog.lang = 'tr-TR';
  recog.continuous = true;
  recog.interimResults = true;

  recog.onstart = () => {
    btn.className = 'on';
    btn.textContent = '🔴 DUR';
    addLog('Recognition başladı');
  };

  recog.onresult = (e) => {
    let interim = '';
    // Sadece yeni gelen sonuçları ekle
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        const t = e.results[i][0].transcript;
        if (!sessionText.endsWith(t)) {
          sessionText += t + ' ';
        }
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    log.textContent = 'Biriken: ' + sessionText + '\nAra: ' + interim;
  };

  recog.onerror = (e) => {
    addLog('Hata: ' + e.error);
    if (e.error === 'no-speech' && micDown) {
      addLog('no-speech ama parmak basılı, yeniden başlat');
      setTimeout(() => { if (micDown) startRecog(); }, 100);
    }
  };

  recog.onend = () => {
    addLog('Recognition bitti. micDown=' + micDown + ' sessionText="' + sessionText + '"');
    btn.className = '';
    btn.textContent = '🎙️ BAS';
    if (micDown) {
      addLog('Parmak hâlâ basılı, yeniden başlat');
      setTimeout(() => { if (micDown) startRecog(); }, 100);
    } else {
      // Parmak bırakılmış ve recognition bitti — gönder
      if (sessionText.trim()) {
        addLog('✅ GÖNDERİLECEK: ' + sessionText.trim());
      } else {
        addLog('⚠️ Boş metin, gönderilmedi');
      }
    }
  };

  recog.start();
}

function onPress(e) {
  e.preventDefault();
  if (micDown) return;
  micDown = true;
  sessionText = ''; // yeni basış
  addLog('PARMAK BASTI');
  startRecog();
}

function onRelease(e) {
  e.preventDefault();
  if (!micDown) return;
  micDown = false;
  addLog('PARMAK BIRAKTI, metin: "' + sessionText + '"');
  if (recog) {
    try { recog.stop(); } catch(err) {}
    // onend'de gönderim yapılacak
  } else {
    // recog zaten bitmişti
    if (sessionText.trim()) {
      addLog('✅ GÖNDERİLECEK: ' + sessionText.trim());
    }
  }
}

btn.addEventListener('touchstart', onPress, {passive: false});
btn.addEventListener('touchend', onRelease, {passive: false});
btn.addEventListener('touchcancel', onRelease, {passive: false});
btn.addEventListener('mousedown', onPress);
btn.addEventListener('mouseup', onRelease);
btn.addEventListener('mouseleave', () => { if (micDown) onRelease(new Event('mouseleave')); });
</script>
</body>
</html>
